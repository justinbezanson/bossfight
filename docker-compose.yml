services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "${APP_PORT:-80}:80"
    environment:
      - APP_ENV=${APP_ENV:-local}
      - APP_DEBUG=${APP_DEBUG:-true}
      - LOG_LEVEL=${LOG_LEVEL:-debug}
    env_file:
      - .env
    volumes:
      - bossfight-database:/var/www/html/database
      - bossfight-storage:/var/www/html/storage
      - ./app:/var/www/html/app
      - ./config:/var/www/html/config
      - ./database/migrations:/var/www/html/database/migrations
      - ./resources:/var/www/html/resources
      - ./routes:/var/www/html/routes
    restart: unless-stopped
    healthcheck:
      test:
        - CMD
        - curl
        - -f
        - http://localhost/up
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

volumes:
  bossfight-database:
  bossfight-storage:
