services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "${APP_PORT:-80}:80"
    environment:
      - APP_ENV=production
      - APP_DEBUG=false
      - LOG_LEVEL=warning
    env_file:
      - .env
    volumes:
      - bossfight-database:/var/www/html/database
      - bossfight-storage:/var/www/html/storage
    restart: unless-stopped
    healthcheck:
      test:
        - CMD
        - curl
        - -f
        - http://localhost/up
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

volumes:
  bossfight-database:
  bossfight-storage:
