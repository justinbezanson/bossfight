services:
  app:
    environment:
      - APP_ENV=production
      - APP_DEBUG=false
      - LOG_LEVEL=warning
    volumes:
      - bossfight-database:/var/www/html/database
      - bossfight-storage:/var/www/html/storage
    healthcheck:
      test:
        - CMD
        - curl
        - -f
        - http://localhost/up
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
